name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Go test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: goshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d goshop_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      environment: production
      http_port: 8888
      grpc_port: 8889
      auth_secret: ci-test-secret
      database_uri: postgres://postgres:postgres@localhost:5432/goshop_test
      redis_uri: localhost:6379
      redis_password: ""
      redis_db: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 240s
