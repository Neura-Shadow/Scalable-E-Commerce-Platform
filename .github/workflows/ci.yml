name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26.5"
  MIGRATE_VERSION: "v4.18.3"
  database_uri: postgres://postgres:postgres@localhost:5432/goshop_test?sslmode=disable
  redis_uri: localhost:6379
  redis_password: ""
  redis_db: 0
  environment: production
  http_port: 8888
  grpc_port: 8889
  auth_secret: ci-test-secret-that-is-at-least-32-bytes
  database_auto_migrate: "false"

jobs:
  quality:
    name: Migrations, vet, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: goshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d goshop_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Verify Go formatting
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          base="$PR_BASE_SHA"
          if [ -z "$base" ]; then
            base="$(git rev-parse HEAD^)"
          fi
          files="$(git diff --name-only --diff-filter=ACMR "$base"...HEAD -- '*.go')"
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted="$(gofmt -l $files)"
          test -z "$unformatted" || { printf '%s\n' "$unformatted"; exit 1; }

      - name: Install migration CLI
        run: go install -tags postgres github.com/golang-migrate/migrate/v4/cmd/migrate@${MIGRATE_VERSION}

      - name: Apply migrations to fresh PostgreSQL
        run: |
          migrate -path migrations -database "$database_uri" up
          migrate -path migrations -database "$database_uri" up

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1 -timeout 240s

  race:
    name: Race detector
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: goshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d goshop_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install migration CLI
        run: go install -tags postgres github.com/golang-migrate/migrate/v4/cmd/migrate@${MIGRATE_VERSION}

      - name: Apply migrations
        run: migrate -path migrations -database "$database_uri" up

      - name: Race test
        run: go test -race ./...

  static-analysis:
    name: Static analysis and vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          staticcheck ./...

      - name: Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  workflow-lint:
    name: Actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Validate workflows
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          actionlint .github/workflows/*.yml

  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Scan Git history
        run: |
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          gitleaks git --redact --no-banner

  filesystem-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan repository
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  container:
    name: Container build and scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate Compose release profile
        env:
          DATABASE_URI: postgres://postgres:postgres@postgres:5432/goshop_test?sslmode=disable
          AUTH_SECRET: ci-compose-validation-not-a-production-secret
        run: docker compose --profile application config --quiet

      - name: Build release image
        run: docker build -t scalable-ecommerce-platform:v1.0.0 .

      - name: Scan release image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: scalable-ecommerce-platform:v1.0.0
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
